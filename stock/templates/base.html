{% load static %}
<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Биржевая система</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}" />
</head>
<body>
    <main>
        <div class="py-3 bg-light">
            <div class="container">
                <div class="row">
                    <div class="col d-flex justify-content-between align-items-center">
                        <div>
                            {% if user.is_authenticated %}
                                <span>Добро пожаловать, <strong>{{ user.username }}</strong></span>
                            {% endif %}
                        </div>
                        <div>
                            {% if user.is_authenticated %}
                                <a href="{% url 'stock:account' %}" class="btn btn-outline-primary btn-sm me-2">Личный кабинет</a>
                                <form method="post" action="{% url 'logout' %}" class="d-inline">
                                    {% csrf_token %}
                                    <button type="submit" class="btn btn-outline-danger btn-sm">Выход</button>
                                </form>
                            {% else %}
                                <a href="{% url 'login' %}" class="btn btn-primary btn-sm">Вход</a>
                            {% endif %}
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="py-5 bg-light">
            <div class="container">
                <div class="row">
                    <div class="col">
                        {% block content %}{% endblock %}
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
